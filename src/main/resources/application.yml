spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: enterprise-crud-api
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: Enterprise CRUD API
    description: API corporativa lista para produccion
    version: 1.0.0

logging:
  pattern:
    level: "%5p [corr:%X{correlationId:-N/A}]"

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    issuer: ${JWT_ISSUER:enterprise-crud-api}
    secret: ${JWT_SECRET}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:7}
  rate-limit:
    login:
      capacity: ${LOGIN_RATE_LIMIT_CAPACITY:10}
      refill-tokens: ${LOGIN_RATE_LIMIT_REFILL_TOKENS:10}
      refill-minutes: ${LOGIN_RATE_LIMIT_REFILL_MINUTES:1}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      email: ${BOOTSTRAP_ADMIN_EMAIL:admin@local.dev}
      password: ${BOOTSTRAP_ADMIN_PASSWORD}
